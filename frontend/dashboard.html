<!DOCTYPE html>
<html>
<head>
  <title>LEChain Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .search-results-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    .search-results-table th,
    .search-results-table td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    .similarity-high {
      color: green;
      font-weight: bold;
    }

    .similarity-medium {
      color: orange;
    }

    .similarity-low {
      color: red;
    }

    .result-type {
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="topbar">
  <span id="roleDisplay"></span>
  <button onclick="logout()">Logout</button>
</div>

<!-- upload section -->
<div class="card" id="uploadSection">
  <h3>Upload Evidence</h3>
  <input type="file" id="file">
  <input type="text" id="caseId" placeholder="Case ID">
  <button id="uploadBtn">Upload</button>
  <p id="uploadStatus"></p>
</div>

<!-- semantic search section -->
<div class="card">
  <h3>Semantic Search (Registered Evidence Only)</h3>

  <div class="search-row">
    <input 
      type="text" 
      id="searchQuery" 
      placeholder="Enter search text (e.g., blood stained knife)"
    >

    <input 
      type="text" 
      id="searchCaseId" 
      placeholder="Optional Case ID"
    >

    <button onclick="performSemanticSearch()">Search</button>
  </div>

  <div id="searchResults"></div>
</div>

<!-- evidence table -->
<div class="card">
  <h3>Evidence Dashboard</h3>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Case</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<script src="dashboard.js"></script>
</body>
</html>
