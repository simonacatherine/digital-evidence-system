<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .search-results-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    .search-results-table th,
    .search-results-table td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    .similarity-high {
      color: green;
      font-weight: bold;
    }

    .similarity-medium {
      color: orange;
    }

    .similarity-low {
      color: red;
    }

    .card {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 6px;
      background-color: #fafafa;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
    }
  </style>
</head>

<body>

<!-- top bar -->
<div class="topbar">
  <span id="roleDisplay"></span>
  <button onclick="logout()">Logout</button>
</div>

<div class="card" id="createCaseSection">
  <h3>Create New Case</h3>

  <input type="text" id="newCaseId" placeholder="Case ID">
  <input type="text" id="newCaseName" placeholder="Case Name">

  <button onclick="createCase()">Create Case</button>

  <p id="caseCreateStatus"></p>
</div>

<div class="card">
  <h3>Select Case</h3>
  <select id="caseSelector" onchange="updateSelectedCase()">
    <option value="">-- Select Case --</option>
  </select>
</div>

<!-- upload section -->
<div class="card" id="uploadSection">
  <h3>Upload Evidence</h3>
  <input type="file" id="file">
  <!--<input type="text" id="caseId" placeholder="Case ID" readonly>-->
  <button id="uploadBtn">Upload</button>
  <p id="uploadStatus"></p>
</div>


<!-- semantic search -->
<div class="card">
  <h3>Semantic Search (Registered Evidence Only)</h3>

  <div class="search-row">
    <input 
      type="text" 
      id="searchQuery" 
      placeholder="Enter search text (e.g., blood stained knife)"
    >

    <!--<input 
      type="text" 
      id="searchCaseId" 
      placeholder="Search inside selected case"
      readonly
    >-->

    <button onclick="performSemanticSearch()">Search</button>
  </div>

  <div id="searchResults"></div>
</div>


<!-- evidence table -->
<div class="card">
  <h3>Evidence Dashboard</h3>

  <table style="width:100%; border-collapse: collapse;">
    <thead>
      <tr>
        <th>ID</th>
        <th>Case</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>


<!-- analysis section -->
<div class="card" id="analysisSection" style="display:none;">
  <h3>Forensic Analysis & Reports</h3>

  <!-- View Reports -->
  <div style="margin-bottom:15px;">
    <input 
      type="text" 
      id="analysisEvidenceId" 
      placeholder="Enter Evidence ID to View Reports"
    >
    <button onclick="loadReports()">Load Reports</button>
  </div>

  <div id="reportsContainer" style="margin-bottom:20px;"></div>

  <!-- Create Report -->
  <div id="createReportForm">
    <hr>
    <h4>Create Analysis Report</h4>

    <input 
      type="text" 
      id="reportTitle" 
      placeholder="Report Title"
    ><br><br>

    <textarea 
      id="findings" 
      placeholder="Detailed Findings"
      rows="4"
    ></textarea><br><br>

    <textarea 
      id="conclusion" 
      placeholder="Conclusion"
      rows="3"
    ></textarea><br><br>

    <select id="confidenceLevel">
      <option value="">Select Confidence Level</option>
      <option value="LOW">LOW</option>
      <option value="MEDIUM">MEDIUM</option>
      <option value="HIGH">HIGH</option>
    </select><br><br>

    <button onclick="createReport()">Submit Report</button>
  </div>
</div>


<script src="dashboard.js"></script>

</body>
</html>
